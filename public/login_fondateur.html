<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion Fondateur</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1a3a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.box {
  background: rgba(0,0,0,0.7);
  padding: 25px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
}

input, button {
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
}

button {
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #3a9a40;
}

#msg {
  font-size: 14px;
  color: red;
}
</style>
</head>

<body>

<div class="box">
  <h2>👑 Connexion Fondateur</h2>

  <input id="username" placeholder="Utilisateur">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="login()">Connexion</button>

  <p id="msg"></p>
</div>

<script>
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/api/login/fondateur", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (!data.success) {
    document.getElementById("msg").innerText = data.message;
    return;
  }

  localStorage.setItem("token", data.token);
  window.location.href = data.redirect;
}
</script>

</body>
</html>
