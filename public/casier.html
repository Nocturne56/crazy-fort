<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Casier Joueurs</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1a3a;
  color: white;
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #111a2e;
}

.back {
  color: lightblue;
  cursor: pointer;
}

.box {
  margin: 50px auto;
  width: 600px;
  background: #162447;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #0b1a3a;
  color: white;
  border: 1px solid white;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #2f6fff;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

.card {
  background: #1f2a48;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
}

.warn { color: yellow; }
.kick { color: orange; }
.ban { color: red; }
</style>
</head>

<body>

<div class="topbar">
  <div class="back" onclick="back()">← retour admin</div>
  <div>Casier joueurs</div>
</div>

<div class="box">

<h3>⚠️ Ajouter sanction</h3>

<input id="player" placeholder="Pseudo joueur">
<input id="reason" placeholder="Raison">

<select id="type">
  <option value="warn">Avertisement</option>
  <option value="kick">Kick</option>
  <option value="ban">bannissement</option>
</select>

<button onclick="addSanction()">Ajouter</button>

<hr>

<h3>🔍 Recherche</h3>

<input id="search" oninput="loadCasier()" placeholder="Pseudo joueur">

<div id="list"></div>

</div>

<script>

if (!localStorage.getItem("adminToken")) {
  window.location.href = "/login_admin.html";
}

function back() {
  window.location.href = "/admin.html";
}

async function addSanction() {
  const username = document.getElementById("player").value;
  const reason = document.getElementById("reason").value;
  const type = document.getElementById("type").value;

  await fetch("/api/casier", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, reason, type })
  });

  loadCasier();
}

async function loadCasier() {
  const res = await fetch("/api/casier");
  const data = await res.json();

  const search = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");

  list.innerHTML = "";

  data.forEach((c, index) => {

    if (!c.username.toLowerCase().includes(search)) return;

    let cls = c.type;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${c.username}</b><br>
      <span class="${cls}">[${c.type.toUpperCase()}]</span>
      ${c.reason}<br>
      <small>${new Date(c.date).toLocaleString()}</small><br><br>

      <button onclick="deleteSanction(${index})" style="background:red;">
        Supprimer
      </button>
    `;

    list.appendChild(div);
  });
}

async function deleteSanction(index) {
  if (!confirm("Supprimer cette sanction ?")) return;

  const res = await fetch("/api/deleteSanction", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ index })
  });

  const data = await res.json();

  if (data.success) {
    loadCasier();
  } else {
    alert("Erreur suppression");
  }
}

loadCasier();

</script>

</body>
</html>
