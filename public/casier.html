<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Panel Admin - Casier</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1a3a;
    color: white;
}

header {
    padding: 20px;
    background: #122a57;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.container {
    padding: 20px;
}

.card {
    background: #162f5f;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.delete {
    background: red;
    color: white;
}

.form {
    margin-bottom: 20px;
    background: #162f5f;
    padding: 15px;
    border-radius: 10px;
}

input, select {
    padding: 8px;
    margin: 5px;
}
</style>
</head>

<body>

<header>
    <h2>Panel Admin - Casier</h2>
</header>

<div class="container">

    <!-- AJOUT SANCTION -->
    <div class="form">
        <h3>Ajouter une sanction</h3>

        <input id="username" placeholder="Pseudo">
        <input id="reason" placeholder="Raison">

        <select id="type">
            <option value="warn">Warn</option>
            <option value="kick">Kick</option>
            <option value="ban">Ban</option>
        </select>

        <button onclick="addSanction()">Ajouter</button>
    </div>

    <!-- LISTE CASIER -->
    <div id="casierList"></div>

</div>

<script>
// =============================
// 🔄 CHARGER CASIER
// =============================
async function loadCasier() {
    const res = await fetch("/api/casier");
    const data = await res.json();

    const container = document.getElementById("casierList");
    container.innerHTML = "";

    data.forEach(item => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>Pseudo :</b> ${item.username} <br>
            <b>Type :</b> ${item.type} <br>
            <b>Raison :</b> ${item.reason} <br>
            <b>Date :</b> ${new Date(item.date).toLocaleString()} <br><br>

            <button class="delete" onclick="deleteSanction('${item._id}')">
                Supprimer
            </button>
        `;

        container.appendChild(div);
    });
}

// =============================
// ➕ AJOUT SANCTION
// =============================
async function addSanction() {
    const username = document.getElementById("username").value;
    const reason = document.getElementById("reason").value;
    const type = document.getElementById("type").value;

    const res = await fetch("/api/casier", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, reason, type })
    });

    const data = await res.json();

    if (data.success) {
        alert("Sanction ajoutée !");
        loadCasier();
    } else {
        alert("Erreur");
    }
}

// =============================
// ❌ SUPPRESSION SANCTION
// =============================
async function deleteSanction(id) {
    const res = await fetch("/api/deleteSanction", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id })
    });

    const data = await res.json();

    if (data.success) {
        loadCasier();
    } else {
        alert("Erreur suppression");
    }
}

// =============================
// 🚀 INIT
// =============================
loadCasier();
</script>

</body>
</html>
