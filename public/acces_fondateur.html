<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Fondateurs</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1a3a;
    color: white;
    text-align: center;
}

/* HEADER */
.header {
    position: relative;
    padding: 20px;
    background: rgba(0,0,0,0.3);
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* RETOUR BUTTON */
.back-btn {
    position: absolute;
    top: 15px;
    right: 15px;

    padding: 10px 15px;
    border: none;
    border-radius: 8px;

    background: #2f5bd6;
    color: white;
    cursor: pointer;

    transition: 0.2s;
}

.back-btn:hover {
    background: #3f6dff;
}

/* INPUTS */
input {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* BUTTONS */
button {
    padding: 10px 15px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* CARD STYLE */
.card {
    background: rgba(255,255,255,0.08);
    margin: 10px auto;
    padding: 12px;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0 0 8px rgba(0,0,0,0.3);
}

/* DELETE BUTTON */
.delete-btn {
    background: #ff4d4d;
    color: white;
}

.delete-btn:hover {
    background: #ff1f1f;
}

/* ADD BUTTON */
.add-btn {
    background: #2ecc71;
    color: white;
}

.add-btn:hover {
    background: #25a85a;
}
</style>
</head>

<body>

<div class="header">
    <h1>👑 Gestion des Fondateurs</h1>

    <!-- 🔙 BOUTON RETOUR -->
    <button class="back-btn" onclick="window.location.href='fondateur.html'">
        ⬅ Retour
    </button>
</div>

<h2>Ajouter un fondateur</h2>

<input id="username" placeholder="Nom d'utilisateur">
<input id="password" placeholder="Mot de passe">
<br>

<button class="add-btn" onclick="addFondateur()">Ajouter</button>

<h2>Liste des fondateurs</h2>

<div id="list"></div>

<script>

// 🔄 Charger la liste
function loadFondateurs() {
    fetch("/api/fondateurs")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(f => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <b>${f.username}</b>
                <br>
                <button class="delete-btn" onclick="deleteFondateur('${f.username}')">
                    Supprimer
                </button>
            `;

            list.appendChild(div);
        });
    });
}

// ➕ Ajouter
function addFondateur() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    fetch("/api/fondateurs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.text())
    .then(() => loadFondateurs());
}

// ❌ Supprimer
function deleteFondateur(username) {
    fetch("/api/deleteFondateur", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
    })
    .then(res => res.text())
    .then(() => loadFondateurs());
}

// 🚀 init
loadFondateurs();

</script>

</body>
</html>
