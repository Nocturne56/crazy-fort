<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Crazy Fort saison 1</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  display: flex;

  height: 100vh;
  overflow: hidden;

  background: url("assets/logo-crazy-fort.png") no-repeat center center fixed;
  background-size: cover;
}

/* Overlay sombre */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* SIDEBAR */
.sidebar {
  width: 125px;
  height: 100vh;
  background: rgba(8, 20, 43, 0.9);
  padding-top: 20px;
}

.sidebar a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
  transition: 0.2s;
}

.sidebar a:hover {
  background: #12245c;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* BOX */
.box {
  background: rgba(18, 36, 92, 0.75); /* plus transparent */
  padding: 30px;
  border-radius: 15px;
  min-width: 320px;
  text-align: center;

  position: relative;
  top: -25px; /* remonte la box */
}

/* Connexion button */
.connexion-btn {
  position: absolute;
  top: 20px;
  right: 20px;

  background: #1f3b82;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 25px;
  cursor: pointer;
}

.connexion-btn:hover {
  background: #2f5bd6;
}

/* IP button */
.ip-btn {
  margin-top: 10px;
  padding: 10px 15px;

  border: none;
  border-radius: 10px;

  cursor: pointer;
  background: #2f5bd6;
  color: white;
}

.ip-btn:hover {
  background: #3f6dff;
}

/* STATUS */
.online { color: #00ff88; }
.maintenance { color: #ffd000; }
.offline { color: red; }
.erreur { color: 8B0000; }

/* SUB TEXT */
.sub-info {
  margin-top: 12px;
  font-size: 13px;
  opacity: 0.8;
  line-height: 1.4;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.6);

  display: flex;
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: #12245c;
  padding: 25px;
  border-radius: 15px;

  display: flex;
  flex-direction: column;
  gap: 10px;

  min-width: 260px;
}

.popup-box button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.close {
  background: red;
  color: white;
}

.hidden {
  display: none;
}

/* FOOTER */
.footer-right {
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="index.html">🏠 Accueil</a>
  <a href="mods.html">📦 Mods</a>
</div>

<!-- MAIN -->
<div class="main">

  <button class="connexion-btn" onclick="openPopup()">
    🔐 Connexion
  </button>

  <div class="box">
    <h1>🌍 Crazy Fort saison 1</h1>

    <p>Version : <span id="version">...</span></p>
    <p>Statut : <span id="status">Chargement...</span></p>

    <p>IP : Crazyfort.aternos.me:38656</p>

    <button class="ip-btn" onclick="copyIP()">
      📋 Copier IP
    </button>

    <div class="sub-info">
      serveur créer par @lucas_bernadez<br>
      ouvert officiellement depuis le 06/04/2026 à 14:30
    </div>
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-box">

    <h2>🔐 Connexion</h2>

    <button onclick="goFondateur()">🏛️ Connexion Fondateur</button>
    <button onclick="goAdmin()">🛡️ Connexion Administration</button>

    <button class="close" onclick="closePopup()">🔴 Retour</button>

  </div>
</div>

<!-- FOOTER -->
<div class="footer-right">
  créer par @loevan56 pour Crazy Fort, tout droit réservé ©
</div>

<script>
/* LOAD CONFIG */
async function loadStatus() {
  try {
	const res = await fetch("/api/config");
    const data = await res.json();

    document.getElementById("version").textContent = data.version;

    const el = document.getElementById("status");

    if (data.status === "online") {
	el.textContent = "🟢 Le serveur est en ligne !";
	el.className = "online";
	}
	else if (data.status === "maintenance") {
	el.textContent = "🟡 Maintenance en cours sur le serveur !";
	el.className = "maintenance";
	}
	else if (data.status === "erreur") {
	el.textContent = "❌ Une erreur c'est produite, aucune informations disponible.";
	el.className = "erreur";
	}
	else {
	el.textContent = "🔴 Le serveur est hors ligne !";
	el.className = "offline";
	}

  } catch (e) {
    document.getElementById("status").textContent =
      "❌ ERREUR • Contacté le créateur du site !";
  }
}

/* IP COPY */
function copyIP() {
  navigator.clipboard.writeText("CrazyFortSaison1.aternos.me:15919");
  alert("IP copiée !");
}

/* POPUP */
function openPopup() {
  document.getElementById("popup").classList.remove("hidden");
}

function closePopup() {
  document.getElementById("popup").classList.add("hidden");
}

function goAdmin() {
  window.location.href = "/login_admin.html";
}

function goFondateur() {
  window.location.href = "/login_fondateur.html";
}

/* INIT */
loadStatus();
</script>

</body>
</html>
