<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Administrateurs</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1a3a;
    color: white;
    text-align: center;
}

/* HEADER */
.header {
    position: relative;
    padding: 20px;
    background: rgba(0,0,0,0.3);
}

/* RETOUR */
.back-btn {
    position: absolute;
    top: 15px;
    right: 15px;

    padding: 10px 15px;
    border: none;
    border-radius: 8px;

    background: #2f5bd6;
    color: white;
    cursor: pointer;
}

.back-btn:hover {
    background: #3f6dff;
}

/* INPUTS */
input {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

/* BUTTONS */
button {
    padding: 10px 15px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    margin: 10px auto;
    padding: 12px;
    width: 300px;
    border-radius: 10px;
}

/* COLORS */
.add-btn {
    background: #2ecc71;
    color: white;
}

.delete-btn {
    background: #ff4d4d;
    color: white;
}
</style>
</head>

<body>

<div class="header">
    <h1>🛡️ Gestion des Administrateurs</h1>

    <!-- 🔙 retour -->
    <button class="back-btn" onclick="window.location.href='fondateur.html'">
        ⬅ Retour
    </button>
</div>

<h2>Ajouter un administrateur</h2>

<input id="username" placeholder="Nom d'utilisateur">
<input id="password" placeholder="Mot de passe">
<br>

<button class="add-btn" onclick="addAdmin()">Ajouter</button>

<h2>Liste des administrateurs</h2>

<div id="list"></div>

<script>

// 📖 charger admins
function loadAdmins() {
    fetch("/api/admins")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(a => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <b>${a.username}</b>
                <br>
                <button class="delete-btn" onclick="deleteAdmin('${a.username}')">
                    Supprimer
                </button>
            `;

            list.appendChild(div);
        });
    });
}

// ➕ ajouter
function addAdmin() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    fetch("/api/admins", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(() => loadAdmins());
}

// ❌ supprimer
function deleteAdmin(username) {
    fetch("/api/deleteAdmin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
    })
    .then(() => loadAdmins());
}

// init
loadAdmins();

</script>

</body>
</html>
