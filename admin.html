<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Panel Admin</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1a3a;
  color: white;
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #111a2e;
}

.logout {
  color: red;
  cursor: pointer;
}

.box {
  margin: 50px auto;
  width: 500px;
  background: #162447;
  padding: 20px;
  border-radius: 10px;
}

.title {
  font-size: 20px;
  margin-bottom: 20px;
}

.link {
  margin-top: 15px;
  padding: 10px;
  background: #1f2a48;
  cursor: pointer;
  border-radius: 5px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>Connecté en tant qu'administrateur</div>
  <div class="logout" onclick="logout()">déconnexion</div>
</div>

<div class="box">
  <div class="title">Dashboard admin</div>

  <div class="link" onclick="goCasier()">
    🔍 Casier des joueurs
  </div>
</div>

<script>
if (!localStorage.getItem("adminToken")) {
  window.location.href = "/login-admin.html";
}

function logout() {
  localStorage.removeItem("adminToken");
  window.location.href = "/index.html";
}

function goCasier() {
  window.location.href = "/casier.html";
}
</script>

</body>
</html>
